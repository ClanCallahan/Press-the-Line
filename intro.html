<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<link rel="manifest" href="manifest.json">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Press the Line">
<meta name="theme-color" content="#0d0a03">
<link rel="apple-touch-icon" sizes="180x180" href="icons/apple-touch-icon.png">
<title>Press the Line — 499 BCE</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Cinzel:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.min.css"/>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
/* Disable text selection & long-press callout so taps/holds don't highlight text. */
html,body{-webkit-user-select:none;-moz-user-select:none;-ms-user-select:none;user-select:none;-webkit-touch-callout:none;}
input,textarea,[contenteditable]{-webkit-user-select:text;-moz-user-select:text;-ms-user-select:text;user-select:text;-webkit-touch-callout:default;}
html,body{width:100%;height:100%;background:#050301;font-family:'Cinzel',Georgia,serif;color:#c8a060;-webkit-font-smoothing:antialiased;overflow:hidden;}

/* ── Persistent starfield ── */
#stars{position:fixed;inset:0;z-index:0;pointer-events:none;background:radial-gradient(ellipse at 50% 40%,#120a03 0%,#070401 65%,#030100 100%);}
.star{position:absolute;border-radius:50%;background:#fff;animation:twinkle var(--d) var(--delay) infinite alternate ease-in-out;}
@keyframes twinkle{from{opacity:.08;transform:scale(.6);}to{opacity:.75;transform:scale(1.15);}}

/* ── Paged scenes (only .active is shown) ── */
.scene{
  display:none;
  position:fixed;inset:0;z-index:2;
  flex-direction:column;align-items:center;justify-content:flex-start;
  padding:clamp(30px,5vh,60px) clamp(20px,4vw,40px) 110px;
  overflow-y:auto;
  animation:sceneIn .7s ease both;
}
.scene.active{display:flex;}
@keyframes sceneIn{from{opacity:0;}to{opacity:1;}}

.scene-inner{width:100%;max-width:860px;margin:auto 0;}
.scene h2{
  font-family:'Cinzel Decorative',Georgia,serif;
  font-size:clamp(22px,4.2vw,38px);
  font-weight:900;
  letter-spacing:clamp(8px,2.4vw,18px);
  color:#c9a84c;
  text-shadow:0 0 30px rgba(201,168,76,.45),0 0 6px rgba(201,168,76,.3);
  text-align:center;
  margin-bottom:clamp(14px,2.5vh,28px);
}
.scene h2 .eyebrow{
  display:block;
  font-family:'Cinzel',serif;font-weight:400;
  font-size:clamp(9px,1.7vw,12px);letter-spacing:6px;
  color:#7a6030;text-shadow:none;
  margin-bottom:10px;text-transform:uppercase;
}
.scene p{
  font-family:Georgia,'Times New Roman',serif;
  font-size:clamp(13px,2.1vw,15px);
  line-height:1.7;color:#b29a68;
  margin-bottom:13px;
  text-align:justify;hyphens:auto;
}
@media (max-width:600px){.scene p{text-align:left;}}
.scene p em{color:#d8b860;font-style:italic;}
.scene p .name,.scene p .place{color:#e8c96b;letter-spacing:.5px;}
.scene .pullquote{
  font-family:'Cinzel',Georgia,serif;font-style:italic;
  font-size:clamp(13px,2.4vw,17px);color:#d0a858;
  text-align:center;
  border-left:2px solid rgba(201,168,76,.35);border-right:2px solid rgba(201,168,76,.35);
  padding:15px 20px;margin:20px auto;max-width:600px;line-height:1.5;
}
.scene .pullquote cite{
  display:block;margin-top:8px;
  font-size:clamp(9px,1.5vw,11px);letter-spacing:3px;
  color:#7a6030;font-style:normal;text-transform:uppercase;
}
.ornament{text-align:center;color:rgba(201,168,76,.32);letter-spacing:8px;
  font-size:clamp(14px,2.5vw,18px);margin:clamp(14px,2.5vh,24px) 0;}

/* ── Map wrapper (Leaflet) ── */
.map-wrap{
  position:relative;width:100%;max-width:720px;
  margin:0 auto clamp(16px,2.5vh,26px);
  aspect-ratio:16/9;
  border:1px solid rgba(201,168,76,.3);border-radius:6px;
  box-shadow:0 0 30px rgba(201,168,76,.15),inset 0 0 60px rgba(0,0,0,.5);
  overflow:hidden;background:#0a0a0a;
}
.leaflet-intro{width:100%;height:100%;background:#050301;}
.leaflet-intro .leaflet-tile-pane{filter:sepia(.35) saturate(.65) brightness(.7) contrast(1.1);}
.leaflet-intro .leaflet-control-attribution{display:none;}

/* City markers inside intro Leaflet maps */
.intro-city-marker{pointer-events:none;}
.intro-city-marker .icm-halo{
  position:absolute;left:-12px;top:-12px;width:24px;height:24px;
  border-radius:50%;
  animation:icmPulse 3s ease-in-out infinite;
}
.intro-city-marker .icm-dot{
  position:absolute;left:-4px;top:-4px;width:8px;height:8px;
  border-radius:50%;border:1.3px solid;
  box-shadow:0 0 10px rgba(0,0,0,.8);
}
.intro-city-marker .icm-label{
  position:absolute;left:9px;top:-20px;
  white-space:nowrap;
  font-family:'Cinzel',Georgia,serif;font-size:11px;font-weight:600;
  letter-spacing:.5px;
  text-shadow:0 0 6px rgba(0,0,0,.95),0 1px 3px rgba(0,0,0,.95),0 0 2px rgba(0,0,0,1);
}
.intro-city-marker.target .icm-halo{
  left:-18px;top:-18px;width:36px;height:36px;
  animation:icmPulseTarget 2s ease-in-out infinite;
}
.intro-city-marker.target .icm-dot{
  left:-5px;top:-5px;width:10px;height:10px;border-width:1.5px;
}
.intro-city-marker.target .icm-label{
  font-size:13px;letter-spacing:2px;font-weight:700;text-transform:uppercase;
  left:-50px;top:-32px;text-align:center;width:100px;
}
/* Compact variant — smaller halos for crowded maps (Greek infighting scene) */
.intro-city-marker.compact .icm-halo{
  left:-8px;top:-8px;width:16px;height:16px;
  animation:icmPulseCompact 3s ease-in-out infinite;
}
.intro-city-marker.compact .icm-dot{
  left:-3.5px;top:-3.5px;width:7px;height:7px;
}
.intro-city-marker.compact .icm-label{
  font-size:10px;left:7px;top:-18px;
}
@keyframes icmPulse{
  0%,100%{transform:scale(1);opacity:.45;}
  50%   {transform:scale(1.4);opacity:.8;}
}
@keyframes icmPulseCompact{
  0%,100%{transform:scale(1);opacity:.4;}
  50%   {transform:scale(1.2);opacity:.65;}
}
@keyframes icmPulseTarget{
  0%,100%{transform:scale(1);opacity:.55;}
  50%   {transform:scale(1.55);opacity:.9;}
}

/* ── Royal Road: dashed yellow line that flows ── */
.leaflet-overlay-pane path.royal-road{
  animation: roadFlow 1.8s linear infinite;
}
@keyframes roadFlow{
  from{stroke-dashoffset:0;}
  to  {stroke-dashoffset:-20;}
}

/* ── Rebel march routes: gold dashed, flows faster than the Royal Road ── */
.leaflet-overlay-pane path.march-route{
  animation: marchFlow 1.2s linear infinite;
  filter: drop-shadow(0 0 6px rgba(232,201,107,.7));
}
@keyframes marchFlow{
  from{stroke-dashoffset:0;}
  to  {stroke-dashoffset:-24;}
}

/* ── Greek conflict lines: dashed red, always visible with brightness pulse ── */
.leaflet-overlay-pane path.greek-clash{
  animation: greekClash 2.4s ease-in-out infinite;
}
.leaflet-overlay-pane path.greek-clash.c1{animation-delay:0s;}
.leaflet-overlay-pane path.greek-clash.c2{animation-delay:.6s;}
.leaflet-overlay-pane path.greek-clash.c3{animation-delay:1.2s;}
.leaflet-overlay-pane path.greek-clash.c4{animation-delay:1.8s;}
@keyframes greekClash{
  0%,100%{opacity:.55;stroke-width:2.5;}
  50%    {opacity:1;  stroke-width:4;}
}
/* Dash flow to suggest movement/conflict */
.leaflet-overlay-pane path.greek-clash{
  stroke-dashoffset:0;
}

/* ── Reveal-on-activate animation ── */
.reveal{opacity:0;transform:translateY(20px);
  transition:opacity .9s ease,transform .9s ease;
  transition-delay:.2s;}
.reveal-2{transition-delay:.4s;}
.reveal-3{transition-delay:.6s;}
.reveal-4{transition-delay:.8s;}
.scene.active .reveal{opacity:1;transform:translateY(0);}

/* Flame flicker (bounded SVG elements; safe to transform) */
.flame{transform-origin:bottom center;transform-box:fill-box;}
.scene.active .flame{animation:flicker 1.4s ease-in-out infinite;}
@keyframes flicker{
  0%,100%{transform:scale(1,1);opacity:.9;}
  30%   {transform:scale(.92,1.08);opacity:1;}
  60%   {transform:scale(1.05,.95);opacity:.85;}
}

/* ── Scene 1: title ── */
#sec-title .year-big{
  font-family:'Cinzel Decorative',Georgia,serif;
  font-size:clamp(54px,14vw,140px);font-weight:900;
  letter-spacing:clamp(4px,1.5vw,12px);color:#c9a84c;
  text-align:center;line-height:1;
  text-shadow:0 0 50px rgba(201,168,76,.6),0 0 120px rgba(201,168,76,.25),0 0 8px rgba(201,168,76,.4);
}
#sec-title .game-title{
  font-family:'Cinzel',serif;
  font-size:clamp(12px,2vw,14px);
  letter-spacing:clamp(5px,1.4vw,10px);color:#5a4a20;
  text-transform:uppercase;text-align:center;margin-bottom:18px;
}
#sec-title .tagline{
  font-family:'Cinzel',serif;font-style:italic;
  font-size:clamp(13px,2.3vw,17px);letter-spacing:2px;
  color:#8a7030;text-align:center;
  margin:28px auto 0;max-width:680px;padding:0 20px;line-height:1.7;
  text-transform:uppercase;
}

/* ── Scene headings coloured per scene ── */
#sec-persia h2{color:#d8a050;text-shadow:0 0 30px rgba(220,120,60,.35);}
#sec-greece h2{color:#a8c8ff;text-shadow:0 0 30px rgba(140,180,255,.3);}
#sec-revolt h2{color:#c9a84c;}
#sec-darius h2{color:#e8a060;text-shadow:0 0 40px rgba(200,80,40,.45);}
#sec-darius{background:radial-gradient(ellipse at center,rgba(40,8,4,.45) 0%,rgba(40,8,4,0) 70%);}

/* ── Scene navigation buttons ── */
.scene-nav{
  position:fixed;bottom:0;left:0;right:0;z-index:10;
  display:flex;justify-content:center;align-items:center;gap:16px;
  padding:18px 20px 26px;
  background:linear-gradient(180deg,transparent 0%,rgba(5,3,1,.85) 60%,rgba(5,3,1,.98) 100%);
  pointer-events:none;
}
.scene-nav button{pointer-events:auto;}
.btn-next,.btn-skip,.btn-begin,.btn-prev{
  font-family:'Cinzel',serif;
  cursor:pointer;
  text-transform:uppercase;
  transition:transform .18s,box-shadow .18s,filter .18s,background .18s;
}
.btn-next{
  background:linear-gradient(135deg,#c9a84c,#8b6914);
  border:1.5px solid #e8c96b;border-radius:4px;
  color:#0a0804;font-weight:700;
  font-size:clamp(11px,2.2vw,14px);letter-spacing:4px;
  padding:clamp(10px,1.8vh,14px) clamp(28px,6vw,44px);
  box-shadow:0 0 22px rgba(201,168,76,.35),0 3px 12px rgba(0,0,0,.7);
}
.btn-next:hover{transform:translateY(-2px);box-shadow:0 0 36px rgba(201,168,76,.55),0 6px 16px rgba(0,0,0,.7);filter:brightness(1.07);}
.btn-next:active{transform:translateY(0) scale(.97);}
.btn-skip,.btn-prev{
  background:transparent;
  border:1px solid rgba(140,110,40,.45);border-radius:4px;
  color:#8a7030;font-weight:400;
  font-size:clamp(10px,1.9vw,12px);letter-spacing:3px;
  padding:clamp(9px,1.5vh,12px) clamp(18px,4vw,28px);
}
.btn-skip:hover,.btn-prev:hover{color:#c9a84c;border-color:rgba(201,168,76,.6);background:rgba(201,168,76,.06);}
.btn-begin{
  background:linear-gradient(135deg,#c9a84c,#8b6914);
  border:1.5px solid #e8c96b;border-radius:4px;
  color:#0a0804;font-weight:700;
  font-size:clamp(12px,2.8vw,16px);letter-spacing:5px;
  padding:clamp(14px,2.2vh,20px) clamp(36px,9vw,72px);
  box-shadow:0 0 36px rgba(201,168,76,.45),0 4px 14px rgba(0,0,0,.7);
  display:block;margin:24px auto 0;
}
.btn-begin:hover{transform:translateY(-2px);box-shadow:0 0 52px rgba(201,168,76,.65),0 8px 20px rgba(0,0,0,.7);filter:brightness(1.08);}
.btn-begin:active{transform:translateY(0) scale(.98);}

/* Scene counter */
.scene-counter{
  position:fixed;top:14px;right:18px;z-index:10;
  font-family:'Cinzel',serif;font-size:10px;letter-spacing:4px;
  color:#5a4820;text-transform:uppercase;
}
.scene-counter .sc-num{color:#c9a84c;}

/* Scene 6 specifics */
#sec-begin .faction-badge{
  display:inline-block;padding:7px 20px;
  border-radius:3px;font-size:10px;letter-spacing:4px;text-transform:uppercase;
  margin-bottom:18px;
}
#sec-begin .faction-badge.greek{
  background:linear-gradient(135deg,#0d1e44,#162e6a);color:#a8c8ff;
  border:1px solid rgba(120,180,255,.45);
  box-shadow:0 0 22px rgba(60,100,220,.3);
}
#sec-begin .faction-badge.persian{
  background:linear-gradient(135deg,#3a0c04,#6a1808);color:#ffb070;
  border:1px solid rgba(220,100,50,.45);
  box-shadow:0 0 22px rgba(180,60,20,.3);
}
#sec-begin .decide{
  font-family:'Cinzel Decorative',serif;
  font-size:clamp(18px,3.8vw,28px);letter-spacing:3px;color:#d8b860;
  text-align:center;margin:12px 0 28px;line-height:1.35;
}
#sec-begin .question{
  font-family:Georgia,serif;font-style:italic;
  font-size:clamp(14px,2.5vw,17px);color:#c8a860;
  text-align:center;max-width:580px;margin:0 auto 10px;line-height:1.6;
}

/* ══════════════════ Cinematic map cutscene ══════════════════ */
#cine-map{position:fixed;inset:0;z-index:1;background:#050301;transition:opacity .8s ease;}
#cine-map .leaflet-tile-pane{filter:sepia(.35) saturate(.65) brightness(.7) contrast(1.1);}
#cine-map .leaflet-control-attribution{display:none;}
.leaflet-container{background:#050301;}

/* Vignette + letterbox gradients (mask tile edges during camera motion) */
#cine-vignette{position:fixed;inset:0;z-index:2;pointer-events:none;
  background:
    radial-gradient(ellipse 78% 78% at 50% 47%, rgba(0,0,0,0) 56%, rgba(5,3,1,.72) 100%),
    linear-gradient(180deg, rgba(5,3,1,.55) 0%, rgba(5,3,1,0) 17%, rgba(5,3,1,0) 68%, rgba(5,3,1,.9) 100%);}

/* Title card (transient) */
.cine-title{position:fixed;inset:0;z-index:6;display:flex;flex-direction:column;
  align-items:center;justify-content:center;text-align:center;background:#050301;
  opacity:0;transition:opacity 1.1s ease;pointer-events:none;}
.cine-title.show{opacity:1;}
.cine-title .game-title{font-family:'Cinzel',serif;font-size:clamp(12px,2vw,14px);
  letter-spacing:clamp(5px,1.4vw,10px);color:#5a4a20;text-transform:uppercase;margin-bottom:14px;}
.cine-title .year-big{font-family:'Cinzel Decorative',Georgia,serif;font-size:clamp(54px,14vw,140px);
  font-weight:900;letter-spacing:clamp(4px,1.5vw,12px);color:#c9a84c;line-height:1;
  text-shadow:0 0 50px rgba(201,168,76,.6),0 0 120px rgba(201,168,76,.25);}
.cine-title .year-big .bce{font-size:.55em;color:#8a7030;letter-spacing:6px;}
.cine-title .ornament{color:rgba(201,168,76,.32);letter-spacing:8px;
  font-size:clamp(14px,2.5vw,18px);margin-top:22px;}

/* Empire establishing label (fades on zoom-in) */
.empire-label{position:fixed;left:0;right:0;top:42%;transform:translateY(-50%);z-index:4;
  text-align:center;pointer-events:none;opacity:0;transition:opacity 1.4s ease;}
.empire-label.show{opacity:1;}
.empire-label .el-big{font-family:'Cinzel Decorative',Georgia,serif;font-weight:900;
  font-size:clamp(30px,7vw,72px);letter-spacing:clamp(3px,1.2vw,10px);color:#f0c060;
  text-shadow:0 0 26px rgba(200,60,30,.6),0 0 70px rgba(160,30,10,.45),0 2px 6px rgba(0,0,0,.9);}
.empire-label .el-small{font-family:'Cinzel',serif;font-size:clamp(11px,2vw,16px);
  letter-spacing:clamp(4px,1.4vw,9px);color:#d09050;text-transform:uppercase;margin-top:10px;
  text-shadow:0 0 12px rgba(0,0,0,.9);}

/* Narration caption */
.cine-caption{position:fixed;left:0;right:0;bottom:0;z-index:5;display:flex;justify-content:center;
  padding:0 clamp(20px,5vw,40px) clamp(70px,13vh,120px);pointer-events:none;}
.cine-caption p{max-width:760px;margin:0;
  font-family:Georgia,'Times New Roman',serif;
  font-size:clamp(22.5px,3.75vw,31.5px);line-height:1.6;color:#e6d2a0;
  text-align:center;
  background:rgba(0,0,0,.55);border:1px solid rgba(201,168,76,.16);
  border-radius:14px;padding:14px 26px;
  box-shadow:0 3px 16px rgba(0,0,0,.45);
  text-shadow:0 2px 10px rgba(0,0,0,.95),0 0 4px rgba(0,0,0,1);
  opacity:0;transition:opacity .8s ease;}
.cine-caption p.show{opacity:1;}
.cine-caption p .q{font-style:italic;color:#f0d8a0;}
.cine-caption p .qa{display:block;margin-top:8px;font-style:normal;font-family:'Cinzel',serif;
  font-size:.66em;font-weight:700;letter-spacing:1.5px;color:#dab863;text-transform:uppercase;}

/* Skip + tap hint */
#cine-skip{position:fixed;z-index:8;right:clamp(16px,4vw,30px);bottom:clamp(16px,4vh,30px);
  font-family:'Cinzel',serif;cursor:pointer;text-transform:uppercase;background:rgba(10,7,4,.55);
  border:1px solid rgba(201,168,76,.45);border-radius:4px;color:#c9a84c;font-weight:400;
  font-size:clamp(10px,1.9vw,12px);letter-spacing:3px;padding:10px 20px;transition:all .18s;}
#cine-skip:hover{background:rgba(201,168,76,.12);border-color:rgba(201,168,76,.8);}
#cine-nav{position:fixed;z-index:8;left:clamp(16px,4vw,30px);bottom:clamp(16px,4vh,30px);gap:10px;}
#cine-back,#cine-next{
  font-family:'Cinzel',serif;cursor:pointer;text-transform:uppercase;background:rgba(10,7,4,.55);
  border:1px solid rgba(201,168,76,.45);border-radius:4px;color:#c9a84c;font-weight:400;
  font-size:clamp(10px,1.9vw,12px);letter-spacing:3px;padding:10px 20px;transition:all .18s;}
#cine-back:hover,#cine-next:hover{background:rgba(201,168,76,.12);border-color:rgba(201,168,76,.8);}
#begin-back{position:fixed;z-index:30;left:clamp(16px,4vw,30px);bottom:clamp(16px,4vh,30px);
  font-family:'Cinzel',serif;cursor:pointer;text-transform:uppercase;background:rgba(10,7,4,.55);
  border:1px solid rgba(201,168,76,.45);border-radius:4px;color:#c9a84c;font-weight:400;
  font-size:clamp(10px,1.9vw,12px);letter-spacing:3px;padding:10px 20px;transition:all .18s;}
#begin-back:hover{background:rgba(201,168,76,.12);border-color:rgba(201,168,76,.8);}

/* Cinematic city markers */
.cine-marker{pointer-events:none;}
.cine-marker .cm-halo{position:absolute;left:-11px;top:-11px;width:22px;height:22px;border-radius:50%;
  background:#c8603a;opacity:.5;animation:cmPulse 3s ease-in-out infinite;
  transition:background .8s ease,width .5s ease,height .5s ease,left .5s ease,top .5s ease;}
.cine-marker .cm-dot{position:absolute;left:-4px;top:-4px;width:8px;height:8px;border-radius:50%;
  background:#e8c96b;border:1.3px solid #3a1808;box-shadow:0 0 10px rgba(0,0,0,.85);
  transition:background .8s ease,border-color .8s ease;}
.cine-marker .cm-label{position:absolute;left:9px;top:-9px;white-space:nowrap;
  font-family:'Cinzel',Georgia,serif;font-size:12px;font-weight:600;letter-spacing:.5px;color:#e8c96b;
  text-shadow:0 0 6px rgba(0,0,0,.95),0 1px 3px rgba(0,0,0,.95);transition:color .8s ease;}
.cine-marker.cm-G .cm-halo{background:#6a98e0;}
.cine-marker.cm-G .cm-dot{background:#a8c8ff;border-color:#1a2e56;}
.cine-marker.cm-G .cm-label{color:#a8c8ff;}
.cine-marker.cm-hi .cm-halo{left:-15px;top:-15px;width:30px;height:30px;opacity:.7;animation:cmPulseHi 1.8s ease-in-out infinite;}
.cine-marker.cm-hi .cm-dot{left:-5px;top:-5px;width:10px;height:10px;}
.cine-marker.cm-major .cm-halo{left:-26px;top:-26px;width:52px;height:52px;}
.cine-marker.cm-major.cm-hi .cm-halo{left:-30px;top:-30px;width:60px;height:60px;}
.cine-marker.cm-major .cm-label{font-size:13px;font-weight:700;letter-spacing:1.5px;}
/* Capital cities (Athens / Persepolis): star symbol + larger centred label */
.cine-marker.cm-capital .cm-cap-star{position:absolute;left:-36px;top:-36px;width:72px;height:72px;

// ── Smooth-zoom patch ───────────────────────────────────────────────
// flyTo re-projects every animation frame and rounds each tile level's
// transform to whole pixels (GridLayer._setZoomTransform → .round()). During a
// slow cinematic fly that rounded value flips ±1px frame-to-frame, which reads
// as the tiles "trembling". While _cineSmoothZoom is on we reproduce the exact
// same transform WITHOUT the rounding, so tiles track sub-pixel and move
// smoothly (a hair softer in motion; crisp again the moment the flag clears and
// Leaflet re-rounds). Leaflet is pinned to 1.9.4, so this internal is stable.
(function(){
  if(!window.L || !L.GridLayer) return;
  var proto = L.GridLayer.prototype, orig = proto._setZoomTransform;
  proto._setZoomTransform = function(level, center, zoom){
    if(!window._cineSmoothZoom){ return orig.call(this, level, center, zoom); }
    var m = this._map,
        scale = m.getZoomScale(zoom, level.zoom),
        translate = level.origin.multiplyBy(scale)
            .subtract(m._getNewPixelOrigin(center, zoom));   // no .round()
    if(L.Browser.any3d){ L.DomUtil.setTransform(level.el, translate, scale); }
    else { L.DomUtil.setPosition(level.el, translate); }
  };
})();

// Same idea for city markers — but Marker.update positions via
// latLngToLayerPoint(), which ROUNDS the projected point internally (before it
// even subtracts the origin), so removing the outer round wasn't enough. While
// a dive runs, project the marker directly and subtract the (un-rounded) origin
// so the dots/labels stay fully sub-pixel and stop shimmering.
(function(){
  if(!window.L || !L.Marker) return;
  var mproto = L.Marker.prototype, morig = mproto.update;
  mproto.update = function(){
    if(window._cineSmoothZoom && this._icon && this._map){
      var m = this._map;
      this._setPos(m.project(this._latlng)._subtract(m.getPixelOrigin()));   // no rounding
      return this;
    }
    return morig.call(this);
  };
})();

// ROOT CAUSE: every layer subtracts Map._getNewPixelOrigin(center, zoom), which
// ends in ._round(). As the fly moves the center continuously, that rounded
// origin flips ±1px frame-to-frame, and tiles + roads + markers all subtract
// the same snapped value — so they tremble TOGETHER, locked to each other.
// Un-rounding the origin (only while a dive runs) makes the whole coordinate
// system track sub-pixel, so everything moves smoothly and stays aligned.
(function(){
  if(!window.L || !L.Map) return;
  var mp = L.Map.prototype, orig = mp._getNewPixelOrigin;
  mp._getNewPixelOrigin = function(center, zoom){
    if(!window._cineSmoothZoom){ return orig.call(this, center, zoom); }
    var viewHalf = this.getSize()._divideBy(2);
    return this.project(center, zoom)._subtract(viewHalf)._add(this._getMapPanePos());  // no ._round()
  };
})();

// Toggle the un-rounded pipeline. On a real on→off transition, fire viewreset so

// no reload). Shared by the dives and the pan.

  on = !!on;

// 8-pointed parchment star — the same capital symbol the game uses for Athens/Persepolis
function _starPath(cx, cy, rOuter, rInner){
  var pts='';
  for(var i=0;i<16;i++){
    var ang=(i/16)*Math.PI*2 - Math.PI/2;
    var pr=(i%2===0)?rOuter:rInner;
    pts+=(i?' ':'')+(cx+Math.cos(ang)*pr).toFixed(2)+','+(cy+Math.sin(ang)*pr).toFixed(2);
  }
  return pts;
}
function capitalStarSvg(faction){
  var mc = (faction==='G') ? '#2a58c8' : '#b83018';   // faction dot
  var ic = (faction==='G') ? '#d8eeff' : '#ffe8d0';
  var R=30, rIn=18, r=16, S=72, c=S/2;                 // matches the game's haloR/rInner/r
  return '<svg width="'+S+'" height="'+S+'" viewBox="0 0 '+S+' '+S+'" class="cm-star-svg">'
    + '<polygon points="'+_starPath(c,c,R,rIn)+'" fill="#e8d8a8" stroke="#3a2810" stroke-width="1.4" stroke-linejoin="round"/>'
    + '<polygon points="'+_starPath(c,c,R-1.6,rIn-1)+'" fill="none" stroke="#edd870" stroke-width="0.9" opacity=".9" stroke-linejoin="round"/>'
    + '<circle cx="'+c+'" cy="'+c+'" r="'+r+'" fill="'+mc+'" stroke="#3a2810" stroke-width="1.2"/>'
    + '<circle cx="'+c+'" cy="'+(c-3)+'" r="4.5" fill="'+ic+'" opacity=".85"/>'
    + '</svg>';
}

function makeMarker(lat, lon, name, side, labeled, major){
  // side: 'G' Greek (blue) | 'P' Persian (red) | 'I' Ionian (starts Persian-red, switches later)
  var faction = (side==='G') ? 'G' : 'P';
  var isCapital = (name==='Athens' || name==='Persepolis');
  var icon;
  if(isCapital){
    icon = L.divIcon({
      className: 'cine-marker cm-'+faction+' cm-capital',
      html:'<div class="cm-cap-star">'+capitalStarSvg(faction)+'</div><div class="cm-label">'+name+'</div>',
      iconSize:[0,0], iconAnchor:[0,0]
    });
  } else {
    var cls = 'cine-marker cm-'+faction + (major ? ' cm-major' : '') + (labeled ? '' : ' cm-nolabel');
    icon = L.divIcon({
      className: cls,
      html:'<div class="cm-halo"></div><div class="cm-dot"></div>'+(labeled?'<div class="cm-label">'+name+'</div>':''),
      iconSize:[0,0], iconAnchor:[0,0]
    });
  }
  var m = L.marker([lat,lon], { icon:icon, interactive:false, keyboard:false });
  m.addTo(map);
  m.setOpacity(0);
  return m;
}

// Chaikin-smooth a closed ring for rounded border edges
function chaikin(pts, iters){
  for(var k=0;k<iters;k++){
    var out=[];
    for(var i=0;i<pts.length;i++){
      var a=pts[i], b=pts[(i+1)%pts.length];
      out.push([a[0]*0.75+b[0]*0.25, a[1]*0.75+b[1]*0.25]);
      out.push([a[0]*0.25+b[0]*0.75, a[1]*0.25+b[1]*0.75]);
    }
    pts=out;
  }
  return pts;
}

  // times a second (panPath) so roads ahead of the sweep are revealed in time.
  _roadRenderer = L.svg({ padding: 0.9 }).addTo(map);
  _roadLayer = L.layerGroup().addTo(map);

    L.polyline(pts, {renderer:_roadRenderer, color:'#cda24a', weight:2.2, opacity:.72, dashArray:'5,5', interactive:false}).addTo(_roadLayer);

}

// Same, but fade the current line out first and wait CINE.pre before the new line appears
function delayCap(html){
  var p=document.getElementById('cap-text');
  p.classList.remove('show');
  bt(function(){ caption(html); }, CINE.pre);
}

// Constant-zoom pan through a list of waypoints (Leaflet has no native slow pan).
// Speed is constant in lat/lon arc-length so the camera doesn't lurch between stops.
//
// To stay smooth we DON'T setView per frame (that re-projects every road/marker
// 60×/s — the judder). Instead each frame we slide the whole map pane by one
// transform (tiles + roads + markers ride it together, no reproject), and a few
// times a second we ask the tile layer to load imagery slightly AHEAD of the
// sweep so the leading edge stays covered. The only setView is the final settle,
// which lands on the same pixels already shown (un-rounding keeps it seamless).
var _panCurrent=null;
function panPath(waypoints, ms, done){
  cancelPan();
  var z = map.getZoom();
  var c = map.getCenter();
  var pts = [[c.lat, c.lng]].concat(waypoints);
  var seg=[], total=0;
  for(var i=1;i<pts.length;i++){
    var dy=pts[i][0]-pts[i-1][0], dx=pts[i][1]-pts[i-1][1];
    var d=Math.sqrt(dx*dx+dy*dy); seg.push(d); total+=d;
  }
  if(total===0){ if(done) done(); return; }

  var anchor   = L.latLng(c.lat, c.lng);     // fixed reference for the whole sweep
  var anchorPt = map.project(anchor, z);     // its projected pixel point (zoom z)
  var start=null, lastLoad=-1e9, lastRoads=-1e9;
  var LOAD_MS = 160;                          // refresh tiles ~6×/sec
  var ROAD_MS = 280;                          // advance road window ~3.5×/sec
  var vh = map.getSize();
  var LEAD = Math.max(vh.x, vh.y) * 0.4;      // load ~0.4 viewport ahead of the edge

  function latLngAt(t){
    var target=t*total, acc=0, i=0;
    while(i<seg.length-1 && acc+seg[i] < target){ acc+=seg[i]; i++; }
    var f = seg[i]>0 ? (target-acc)/seg[i] : 1; if(f>1) f=1;
    return L.latLng(pts[i][0]+(pts[i+1][0]-pts[i][0])*f,
                    pts[i][1]+(pts[i+1][1]-pts[i][1])*f);
  }
  function loadAhead(t, ll){
    if(!_tiles) return;
    var p  = map.project(ll, z);
    var pn = map.project(latLngAt(Math.min(1, t+0.01)), z);   // travel direction
    var dx = pn.x-p.x, dy = pn.y-p.y, dl = Math.sqrt(dx*dx+dy*dy) || 1;
    var ahead = map.unproject(L.point(p.x + dx/dl*LEAD, p.y + dy/dl*LEAD), z);
    _tiles._update(ahead);
  }
  function step(ts){
    if(start===null) start=ts;
    var t = Math.min(1,(ts-start)/ms);
    var ll = latLngAt(t);
    _panCurrent = ll;
    // cheap slide: one transform on the map pane; every layer rides it
    L.DomUtil.setPosition(map._mapPane, anchorPt.subtract(map.project(ll, z)));
    if(ts - lastLoad >= LOAD_MS){ lastLoad = ts; loadAhead(t, ll); }
    // advance the road draw-window so roads ahead of the sweep are revealed
    // (only repositions the SVG window — does not re-project the roads)
    if(_roadRenderer && _roadRenderer._update && ts - lastRoads >= ROAD_MS){
      lastRoads = ts; _roadRenderer._update();
    }
    if(t<1){ _panRAF=requestAnimationFrame(step); }
    else {
      map.setView(ll, z, {animate:false});   // settle: pane→0, Leaflet recentred
      _panRAF=null; _panCurrent=null; smoothZoom(false); if(done) done();
    }
  }
  smoothZoom(true);
  _panRAF=requestAnimationFrame(step);
}
function cancelPan(){
  if(_panRAF){
    cancelAnimationFrame(_panRAF); _panRAF=null;
    // interrupted mid-slide: re-centre on the current position so the pane
    // returns to 0 and Leaflet's view matches what's on screen (seamless).
    if(_panCurrent && map){ map.setView(_panCurrent, map.getZoom(), {animate:false}); }
  }
  _panCurrent=null;
  smoothZoom(false);
}

// ══ Beat timeline ══
var beats, beatIdx=-1, beatTimer=null;

function defineBeats(){
  var ION_PAD = {animate:false, paddingTopLeft:[20,40], paddingBottomRight:[20,90]};
  beats = [
    // 0 — title card
    { hold: CINE.titleHold, run:function(seek){
        document.getElementById('cine-title').classList.add('show');
        document.getElementById('cine-skip').style.display='none';
        document.getElementById('cine-nav').style.display='none';
      }},
    // 1 — line 1: empire establishing
    { hold: CINE.empireHold + CINE.pre, run:function(seek){
        document.getElementById('cine-title').classList.remove('show');
        document.getElementById('cine-skip').style.display='block';
        document.getElementById('cine-nav').style.display='flex';
        map.fitBounds(PLAY_BOUNDS, {animate:false, padding:[24,24]});
        drawRoads();
        if(!_empireBorder) drawEmpireBorder();
        setEmpireBorder(true);
        showAllMarkers(true);
        setIonianFaction('P'); highlightIonian(false);
        document.getElementById('empire-label').classList.add('show');
        delayCap('Ancient Persia was the largest empire Earth had ever known. And for the first time in history, it ruled with tolerance and acceptance of its people.');
      }},
    // 2 — line 2: Cyrus / dive to Persepolis
    { hold: CINE.flyPersepolis + CINE.restPersepolis + CINE.pre, run:function(seek){
        document.getElementById('empire-label').classList.remove('show');
        setEmpireBorder(false);
        setIonianFaction('P'); highlightIonian(false);
        if(seek) map.fitBounds(PLAY_BOUNDS, {animate:false, padding:[24,24]});  // replay dive from the empire view
        delayCap('<span class="q">&ldquo;I announce that I will respect the traditions, customs, and religions of the nations of my empire and never let any of my governors look down on or insult them.&rdquo;<span class="qa">— Cyrus the Great, First Persian King</span></span>');
        smoothZoom(true);
        map.flyTo(PERSEPOLIS, panZoom, {animate:true, duration:CINE.flyPersepolis/1000, easeLinearity:CINE.flyEase});
        bt(function(){ smoothZoom(false); }, CINE.flyPersepolis);
      }},
    // 3 — line 3: archers / pan toward Athens
    { hold: CINE.panMs + 600 + CINE.pre, run:function(seek){
        document.getElementById('empire-label').classList.remove('show');
        setEmpireBorder(false);
        setIonianFaction('P'); highlightIonian(false);
        if(seek) map.setView(PERSEPOLIS, panZoom, {animate:false});  // pan is relative — must start at Persepolis
        delayCap('The Persian Empire was ruled by armies of cavalry and archers that could black out the sun with their arrows.');
        panPath(PAN_ROUTE, CINE.panMs);
      }},
    // 4 — line 4: Greece / zoom in toward Athens
    { hold: CINE.zoomAthens + CINE.beatGreece + CINE.pre, run:function(seek){
        setEmpireBorder(false);
        setIonianFaction('P'); highlightIonian(false);
        if(seek) map.setView(ATHENS, panZoom, {animate:false});  // replay the zoom-in from the pan zoom
        delayCap('Ancient Greece was a loose collection of city states that had existed for thousands of years in conflict with each other. Each defended by a phalanx of armored residents with long spears. Only recently, Athens began a radical experiment with democracy.');
        smoothZoom(true);
        map.flyTo(ATHENS, greeceZoom, {animate:true, duration:CINE.zoomAthens/1000, easeLinearity:CINE.flyEase});
        bt(function(){ smoothZoom(false); }, CINE.zoomAthens);
      }},
    // 5 — line 5: seafaring / zoom out to the Ionian coast
    { hold: CINE.flyIonia + CINE.beatIonia + CINE.pre, run:function(seek){
        setIonianFaction('P'); highlightIonian(false);
        if(seek) map.setView(ATHENS, greeceZoom, {animate:false});  // replay the zoom-out from Athens
        delayCap('Greeks were a seafaring people and had settled throughout the Mediterranean and Black Seas, including along the Ionian Coast under Persian rule.');
        smoothZoom(true);
        map.flyToBounds(IONIA_BOUNDS, {animate:true, duration:CINE.flyIonia/1000, easeLinearity:CINE.flyEase, paddingTopLeft:[20,40], paddingBottomRight:[20,90]});
        bt(function(){ smoothZoom(false); }, CINE.flyIonia);
        bt(function(){ highlightIonian(true); }, CINE.flyIonia*0.5);
      }},
    // 6 — line 6: revolt
    { hold: CINE.beatRevolt, run:function(seek){
        setIonianFaction('P'); highlightIonian(true);
        if(seek) map.fitBounds(IONIA_BOUNDS, ION_PAD);
        caption('The Ionian Greeks were led to revolt by a Persian-appointed tyrant from Miletus, fueled by self-preservation after a recent military blunder.');
      }},
    // 7 — line 7: dramatic switch + final line
    { hold: CINE.beatSwitch + CINE.beatFinal, run:function(seek){
        highlightIonian(true);
        if(seek) map.fitBounds(IONIA_BOUNDS, ION_PAD);
        flashSwitch(IONIAN, 'G');
        bt(function(){
          caption('The Ionians convinced Athens to join the fight, igniting a conflict between Greeks and Persians that would echo through history.');
        }, CINE.beatSwitch);
      }}
  ];
}

function playBeat(i, seek){
  if(i>=beats.length){ endCinematic(); return; }
  if(i<0) i=0;
  beatIdx=i;
  if(beatTimer){ clearTimeout(beatTimer); beatTimer=null; }
  clearBeatTimers();
  cancelPan();
  smoothZoom(false);
  beats[i].run(seek);
  beatTimer=setTimeout(function(){ playBeat(i+1, false); }, beats[i].hold);
}

function nextBeat(){
  if(!beats) return;
  if(beatIdx>=beats.length-1){ endCinematic(); return; }
  playBeat(beatIdx+1, true);   // manual jump: relocate the camera for the new line
}

function backBeat(){
  if(!beats || beatIdx<=0) return;
  playBeat(beatIdx-1, true);   // rewind to the start of the previous line, relocating the camera
}

function endCinematic(){
  if(beatTimer){ clearTimeout(beatTimer); beatTimer=null; }
  clearBeatTimers();
  cancelPan();
  smoothZoom(false);
  beatIdx = beats ? beats.length : 99;
  var fade=['cine-map','cine-vignette','empire-label','cine-caption','cine-title'];
  fade.forEach(function(id){ var el=document.getElementById(id); if(el){ el.style.transition='opacity .8s ease'; el.style.opacity='0'; } });
  var sk=document.getElementById('cine-skip'); if(sk) sk.style.display='none';
  var bk=document.getElementById('cine-nav'); if(bk) bk.style.display='none';
  setTimeout(function(){
    fade.forEach(function(id){ var el=document.getElementById(id); if(el) el.style.display='none'; });
    document.getElementById('sec-begin').classList.add('active');
  }, 820);
}

function skipCinematic(e){ if(e){ e.stopPropagation(); } endCinematic(); }
function backCinematic(e){ if(e){ e.stopPropagation(); } backBeat(); }
function nextCinematic(e){ if(e){ e.stopPropagation(); } nextBeat(); }   // same advance as a screen tap

// From the Begin screen, step back into the cinematic at its final line
function backToCinematic(e){
  if(e){ e.stopPropagation(); }
  if(!beats) return;
  document.getElementById('sec-begin').classList.remove('active');
  if(beatTimer){ clearTimeout(beatTimer); beatTimer=null; }
  clearBeatTimers();
  ['cine-map','cine-vignette','cine-caption'].forEach(function(id){
    var el=document.getElementById(id); if(el){ el.style.display=''; el.style.opacity=''; }
  });
  document.getElementById('cine-skip').style.display='block';
  document.getElementById('cine-nav').style.display='flex';
  playBeat(beats.length-1, true);   // replay the last line, relocating the camera
}
function beginCampaign(){ window.location.href='ancient-map.html'; }

// Tap anywhere (except Skip / Back) to jump ahead; keyboard support
document.addEventListener('click', function(e){
  if(!beats || beatIdx>=beats.length) return;
  if(e.target.closest && (e.target.closest('#cine-skip') || e.target.closest('#cine-nav'))) return;
  nextBeat();
});
document.addEventListener('keydown', function(e){
  if(!beats || beatIdx>=beats.length){
    if(e.key==='Enter'||e.key===' '){ beginCampaign(); e.preventDefault(); }
    return;
  }
  if(e.key==='ArrowRight'||e.key===' '||e.key==='Enter'){ nextBeat(); e.preventDefault(); }
  else if(e.key==='ArrowLeft'){ backBeat(); e.preventDefault(); }
  else if(e.key==='Escape'){ skipCinematic(); }
});

// ── Boot ──
buildMap();
addMarkers();
map.whenReady(function(){
  setTimeout(function(){
    map.invalidateSize();
    greeceZoom = map.getBoundsZoom(GREECE_BOUNDS);   // zoom that fits mainland Greece in THIS viewport
    empireZoom = map.getBoundsZoom(PLAY_BOUNDS);      // zoom of the whole-map establishing shot
    panZoom    = empireZoom + (greeceZoom - empireZoom) * CINE.panZoomFrac;  // 50% of the way in
    defineBeats();
    playBeat(0);
  }, 140);
});
</script>
</body>
