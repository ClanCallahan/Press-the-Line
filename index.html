<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<title>Press the Line</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Cinzel:wght@400;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;overflow:hidden;background:#07050200;font-family:'Cinzel',Georgia,serif;user-select:none;-webkit-user-select:none;-moz-user-select:none;-ms-user-select:none;-webkit-touch-callout:none;}
input,textarea,[contenteditable]{-webkit-user-select:text;-moz-user-select:text;-ms-user-select:text;user-select:text;-webkit-touch-callout:default;}

/* ── Background ── */
#bg{position:fixed;inset:0;z-index:0;
  background:radial-gradient(ellipse at 50% 60%,#1c1408 0%,#0a0702 55%,#050301 100%);}

/* ── Stars ── */
.star{position:absolute;border-radius:50%;background:#fff;animation:twinkle var(--d) var(--delay) infinite alternate ease-in-out;}
@keyframes twinkle{from{opacity:.1;transform:scale(.7);}to{opacity:.9;transform:scale(1.2);}}

/* ── Dividing line (battle line) ── */
#divider{
  position:fixed;left:50%;top:0;bottom:0;width:2px;z-index:2;
  background:linear-gradient(180deg,transparent 0%,rgba(201,168,76,.15) 10%,rgba(201,168,76,.6) 40%,rgba(201,168,76,.8) 50%,rgba(201,168,76,.6) 60%,rgba(201,168,76,.15) 90%,transparent 100%);
  box-shadow:0 0 18px rgba(201,168,76,.3);
  transform:translateX(-50%);
}

/* ── SVG panels ── */
#panel-greece{position:fixed;left:0;top:0;width:50%;height:100%;z-index:1;overflow:hidden;}
#panel-persia {position:fixed;right:0;top:0;width:50%;height:100%;z-index:1;overflow:hidden;}

/* ── Centre UI ── */
#centre{
  position:fixed;inset:0;z-index:10;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  pointer-events:none;
}

#title-wrap{text-align:center;margin-bottom:clamp(24px,5vh,48px);animation:fadeDown .9s ease both;}
@keyframes fadeDown{from{opacity:0;transform:translateY(-28px);}to{opacity:1;transform:translateY(0);}}

#title{
  font-family:'Cinzel Decorative',Georgia,serif;
  font-size:clamp(28px,7vw,72px);
  font-weight:900;
  letter-spacing:clamp(12px,3.5vw,28px);
  color:#c9a84c;
  text-shadow:0 0 40px rgba(201,168,76,.55),0 0 80px rgba(201,168,76,.2),0 2px 6px rgba(0,0,0,.9);
  line-height:1.1;
}
#subtitle{
  font-size:clamp(9px,2vw,14px);
  letter-spacing:clamp(3px,1.5vw,10px);
  color:#7a6030;
  text-transform:uppercase;
  margin-top:8px;
  text-shadow:0 1px 4px rgba(0,0,0,.8);
}

/* ── Faction labels (sides) ── */
.faction-label{
  position:fixed;top:clamp(12px,3vh,28px);z-index:11;
  font-family:'Cinzel Decorative',Georgia,serif;
  font-size:clamp(11px,2.5vw,22px);
  letter-spacing:clamp(2px,1vw,6px);
  text-transform:uppercase;
  text-shadow:0 0 24px currentColor,0 2px 6px rgba(0,0,0,.9);
  animation:fadeIn 1.2s ease both;
}
@keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
#lbl-greece{left:clamp(12px,3vw,36px);color:#7ab0ff;}
#lbl-persia {right:clamp(12px,3vw,36px);color:#ff9955;}

/* ── Buttons ── */
#btns{
  display:flex;flex-direction:column;align-items:center;gap:clamp(10px,2vh,18px);
  pointer-events:all;
  animation:fadeUp 1s .4s ease both;
}
@keyframes fadeUp{from{opacity:0;transform:translateY(24px);}to{opacity:1;transform:translateY(0);}}

.btn-faction{
  position:relative;
  width:clamp(220px,55vw,380px);
  padding:clamp(12px,2.5vh,20px) 0;
  border:none;border-radius:3px;
  font-family:'Cinzel',Georgia,serif;
  font-size:clamp(11px,2.8vw,17px);
  letter-spacing:clamp(2px,1vw,7px);
  text-transform:uppercase;
  cursor:pointer;
  transition:transform .18s,box-shadow .18s,filter .18s;
  overflow:hidden;
}
.btn-faction::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,.07),transparent);
  transform:translateX(-100%);
  transition:transform .4s;
}
.btn-faction:hover::before{transform:translateX(100%);}
.btn-faction:hover{transform:translateY(-2px);}
.btn-faction:active{transform:translateY(0) scale(.98);}

/* Continue + Load panel */
#btn-continue{ background:linear-gradient(135deg,#d8b85a,#7a5512); color:#160e02; }
#load-panel{ display:none; position:fixed; inset:0; z-index:50; align-items:center; justify-content:center; background:rgba(0,0,0,.72); }
#load-panel .ld-card{ width:min(92vw,440px); max-height:86vh; overflow:auto; background:linear-gradient(180deg,#1a1306,#0d0a03); border:2px solid #c9a84c; border-radius:8px; padding:18px; box-shadow:0 0 44px rgba(0,0,0,.75); color:#e8d8a8; }
#load-panel h2{ margin:0 0 4px; font-family:'Cinzel',Georgia,serif; font-size:18px; letter-spacing:3px; color:#f0d870; text-align:center; text-shadow:0 0 14px rgba(201,168,76,.7); }
#load-panel .ld-sub{ text-align:center; font-size:10px; letter-spacing:1px; color:#9a8550; margin-bottom:14px; font-family:Georgia,serif; }
.ld-slot{ border:1px solid rgba(201,168,76,.35); border-radius:6px; padding:10px 12px; margin:9px 0; background:rgba(201,168,76,.05); }
.ld-slot .ld-title{ font-family:'Cinzel',Georgia,serif; font-size:13px; letter-spacing:1px; color:#f0d870; }
.ld-slot .ld-meta{ font-family:Georgia,serif; font-size:10px; color:#9a8550; margin-top:2px; }
.ld-row{ display:flex; gap:7px; flex-wrap:wrap; margin-top:8px; }
.ld-btn{ background:linear-gradient(135deg,#2a2008,#15100a); color:#e8c878; border:1px solid #c9a84c; border-radius:4px; font-family:'Cinzel',Georgia,serif; font-size:10px; letter-spacing:1px; padding:5px 14px; cursor:pointer; }
.ld-btn:hover{ background:linear-gradient(135deg,#3a2c0c,#201810); }
.ld-btn.primary{ background:linear-gradient(135deg,#c9a84c,#8b6914); color:#0a0804; border-color:#e8c96b; font-weight:700; }
.ld-close{ display:block; margin:14px auto 0; background:transparent; border:1px solid rgba(201,168,76,.5); color:#c9a84c; font-family:'Cinzel',Georgia,serif; font-size:11px; letter-spacing:3px; padding:8px 26px; cursor:pointer; border-radius:4px; }
.ld-close:hover{ border-color:#f0d070; color:#f0d870; }

/* ── Difficulty selector ── */
#difficulty-wrap{display:flex;flex-direction:column;align-items:center;gap:6px;margin-bottom:10px;}
#difficulty-label{
  font-family:'Cinzel',Georgia,serif;font-size:clamp(9px,2vw,12px);
  letter-spacing:clamp(2px,0.8vw,5px);text-transform:uppercase;
  color:#b89a55;text-shadow:0 0 8px rgba(180,150,80,.4);
}
.diff-seg{display:flex;border:1px solid rgba(180,150,80,.4);border-radius:3px;overflow:hidden;}
.diff-btn{
  background:rgba(20,16,8,.6);color:#9a8450;border:none;
  border-right:1px solid rgba(180,150,80,.25);
  font-family:'Cinzel',Georgia,serif;font-size:clamp(9px,2vw,12px);
  letter-spacing:clamp(1px,0.6vw,3px);text-transform:uppercase;
  padding:clamp(6px,1.4vh,10px) clamp(10px,3vw,22px);cursor:pointer;
  transition:background .18s,color .18s;
}
.diff-btn:last-child{border-right:none;}
.diff-btn:hover{color:#e8c878;background:rgba(40,32,14,.7);}
.diff-btn.active{background:linear-gradient(135deg,#3a2c0e,#5a4518);color:#ffdf9a;text-shadow:0 0 8px rgba(255,210,120,.5);}

#btn-greece{
  background:linear-gradient(135deg,#0d1e44,#162e6a,#0d1e44);
  color:#90c0ff;
  border:1.5px solid rgba(100,160,255,.5);
  box-shadow:0 0 24px rgba(60,100,220,.25),0 4px 12px rgba(0,0,0,.6);
  text-shadow:0 0 12px rgba(120,180,255,.5);
}
#btn-greece:hover{box-shadow:0 0 36px rgba(80,130,255,.45),0 6px 18px rgba(0,0,0,.6);}

#btn-persia{
  background:linear-gradient(135deg,#3a0c04,#6a1808,#3a0c04);
  color:#ffb070;
  border:1.5px solid rgba(200,80,30,.5);
  box-shadow:0 0 24px rgba(180,60,20,.25),0 4px 12px rgba(0,0,0,.6);
  text-shadow:0 0 12px rgba(255,150,80,.4);
}
#btn-persia:hover{box-shadow:0 0 36px rgba(220,80,30,.45),0 6px 18px rgba(0,0,0,.6);}

#btn-quit{
  background:transparent;
  color:#4a3a18;
  border:1px solid rgba(100,80,30,.3);
  box-shadow:none;
  font-size:clamp(9px,2vw,13px);
  letter-spacing:clamp(2px,.8vw,5px);
  padding:clamp(8px,1.5vh,14px) 0;
  width:clamp(140px,35vw,240px);
}
#btn-quit:hover{color:#7a6030;border-color:rgba(140,110,40,.5);box-shadow:0 0 12px rgba(100,80,20,.2);}

/* ── Gold ornament dividers ── */
.ornament{
  color:rgba(201,168,76,.35);
  font-size:clamp(14px,3vw,24px);
  letter-spacing:clamp(6px,2vw,14px);
  margin:clamp(4px,1vh,10px) 0;
  animation:fadeIn 1.4s ease both;
}

/* ── Bottom credit ── */
#credit{
  position:fixed;bottom:12px;left:0;right:0;text-align:center;z-index:11;
  font-size:9px;letter-spacing:3px;color:#3a2a10;text-transform:uppercase;
  animation:fadeIn 2s ease both;
}

/* ── SVG artwork animations ── */
.art-el{animation:artFade 1.5s ease both;}
@keyframes artFade{from{opacity:0;}to{opacity:1;}}
</style>
</head>
<body>

<div id="bg"></div>
<div id="divider"></div>

<!-- Greece panel -->
<div id="panel-greece">
<svg width="100%" height="100%" viewBox="0 0 500 900" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="gGlow" cx="70%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#1a3060" stop-opacity=".5"/>
      <stop offset="100%" stop-color="#0a0702" stop-opacity="0"/>
    </radialGradient>
    <filter id="gBlur"><feGaussianBlur stdDeviation="2"/></filter>
  </defs>
  <rect width="500" height="900" fill="url(#gGlow)"/>

  <!-- Parthenon columns group, bottom-left area -->
  <g transform="translate(40,520)" class="art-el" style="animation-delay:.3s">
    <!-- Stylobate (base) -->
    <rect x="0" y="240" width="340" height="12" fill="#2a3d6a" opacity=".7"/>
    <rect x="10" y="232" width="320" height="10" fill="#3a5090" opacity=".6"/>

    <!-- 7 columns -->
    <g fill="#2a3d6a" opacity=".75">
      <rect x="10"  y="40" width="28" height="192" rx="3"/>
      <rect x="58"  y="40" width="28" height="192" rx="3"/>
      <rect x="106" y="40" width="28" height="192" rx="3"/>
      <rect x="154" y="40" width="28" height="192" rx="3"/>
      <rect x="202" y="40" width="28" height="192" rx="3"/>
      <rect x="250" y="40" width="28" height="192" rx="3"/>
      <rect x="298" y="40" width="28" height="192" rx="3"/>
    </g>
    <!-- Column highlights -->
    <g fill="#4a6abf" opacity=".35">
      <rect x="14"  y="40" width="6" height="192" rx="2"/>
      <rect x="62"  y="40" width="6" height="192" rx="2"/>
      <rect x="110" y="40" width="6" height="192" rx="2"/>
      <rect x="158" y="40" width="6" height="192" rx="2"/>
      <rect x="206" y="40" width="6" height="192" rx="2"/>
      <rect x="254" y="40" width="6" height="192" rx="2"/>
      <rect x="302" y="40" width="6" height="192" rx="2"/>
    </g>
    <!-- Capitals -->
    <g fill="#3a5090" opacity=".7">
      <rect x="6"   y="34" width="36" height="8" rx="1"/>
      <rect x="54"  y="34" width="36" height="8" rx="1"/>
      <rect x="102" y="34" width="36" height="8" rx="1"/>
      <rect x="150" y="34" width="36" height="8" rx="1"/>
      <rect x="198" y="34" width="36" height="8" rx="1"/>
      <rect x="246" y="34" width="36" height="8" rx="1"/>
      <rect x="294" y="34" width="36" height="8" rx="1"/>
    </g>
    <!-- Entablature -->
    <rect x="0" y="20" width="340" height="16" fill="#3a5090" opacity=".7" rx="1"/>
    <!-- Pediment (triangle) -->
    <polygon points="0,20 170,−60 340,20" fill="#2a3d6a" opacity=".6"/>
    <polygon points="10,20 170,−48 330,20" fill="#1a2d5a" opacity=".5"/>
  </g>

  <!-- Greek warrior silhouette, bottom-right of panel -->
  <g transform="translate(270,300)" class="art-el" style="animation-delay:.6s" opacity=".55">
    <!-- Spear -->
    <line x1="90" y1="10" x2="20" y2="340" stroke="#4a6abf" stroke-width="3" stroke-linecap="round"/>
    <polygon points="90,10 82,40 98,40" fill="#6a8adf"/>
    <!-- Shield (aspis) -->
    <ellipse cx="50" cy="200" rx="55" ry="58" fill="#1e3060" stroke="#4a6abf" stroke-width="2"/>
    <ellipse cx="50" cy="200" rx="42" ry="44" fill="none" stroke="#2a4a8a" stroke-width="1.5" opacity=".7"/>
    <!-- Lambda on shield -->
    <text x="50" y="208" text-anchor="middle" font-size="36" fill="#4a6abf" opacity=".8" font-family="Georgia,serif">Λ</text>
    <!-- Helmet -->
    <ellipse cx="90" cy="100" rx="26" ry="28" fill="#2a3d6a" stroke="#4a6abf" stroke-width="1.5"/>
    <rect x="76" y="96" width="28" height="8" fill="#1a2d5a"/>
    <!-- Plume -->
    <path d="M90,72 Q100,40 88,10 Q78,40 90,72" fill="#8a1a0a" opacity=".7"/>
    <!-- Body -->
    <rect x="72" y="126" width="36" height="80" fill="#1e3060" stroke="#3a5090" stroke-width="1.5" rx="4"/>
    <!-- Greaves -->
    <rect x="78" y="206" width="12" height="60" fill="#2a3d6a" stroke="#4a6abf" stroke-width="1" rx="3"/>
    <rect x="98" y="206" width="12" height="60" fill="#2a3d6a" stroke="#4a6abf" stroke-width="1" rx="3"/>
  </g>

  <!-- Greek key border (top) -->
  <g transform="translate(0,0)" class="art-el" style="animation-delay:.2s">
    <path d="M0,0 L500,0 L500,28 L0,28 Z" fill="none" stroke="#2a4a8a" stroke-width="1" opacity=".4"/>
    <!-- Meander pattern -->
    <g stroke="#3a5a9a" stroke-width="1.5" fill="none" opacity=".5">
      <path d="M0,8 L8,8 L8,20 L20,20 L20,8 L32,8 L32,24 L4,24 L4,12"/>
      <path d="M40,8 L48,8 L48,20 L60,20 L60,8 L72,8 L72,24 L44,24 L44,12"/>
      <path d="M80,8 L88,8 L88,20 L100,20 L100,8 L112,8 L112,24 L84,24 L84,12"/>
      <path d="M120,8 L128,8 L128,20 L140,20 L140,8 L152,8 L152,24 L124,24 L124,12"/>
      <path d="M160,8 L168,8 L168,20 L180,20 L180,8 L192,8 L192,24 L164,24 L164,12"/>
      <path d="M200,8 L208,8 L208,20 L220,20 L220,8 L232,8 L232,24 L204,24 L204,12"/>
      <path d="M240,8 L248,8 L248,20 L260,20 L260,8 L272,8 L272,24 L244,24 L244,12"/>
      <path d="M280,8 L288,8 L288,20 L300,20 L300,8 L312,8 L312,24 L284,24 L284,12"/>
      <path d="M320,8 L328,8 L328,20 L340,20 L340,8 L352,8 L352,24 L324,24 L324,12"/>
      <path d="M360,8 L368,8 L368,20 L380,20 L380,8 L392,8 L392,24 L364,24 L364,12"/>
      <path d="M400,8 L408,8 L408,20 L420,20 L420,8 L432,8 L432,24 L404,24 L404,12"/>
      <path d="M440,8 L448,8 L448,20 L460,20 L460,8 L472,8 L472,24 L444,24 L444,12"/>
      <path d="M480,8 L488,8 L488,20 L500,20"/>
    </g>
  </g>

  <!-- Olive branch decoration -->
  <g transform="translate(20,420)" class="art-el" style="animation-delay:.8s" opacity=".4">
    <path d="M0,0 Q60,-30 120,0 Q180,30 240,0" stroke="#3a6030" stroke-width="2" fill="none"/>
    <ellipse cx="30"  cy="-12" rx="10" ry="6" fill="#2a5020" transform="rotate(-20,30,-12)"/>
    <ellipse cx="60"  cy="-18" rx="10" ry="6" fill="#2a5020" transform="rotate(10,60,-18)"/>
    <ellipse cx="90"  cy="-8"  rx="10" ry="6" fill="#2a5020" transform="rotate(-5,90,-8)"/>
    <ellipse cx="120" cy="-2"  rx="10" ry="6" fill="#2a5020" transform="rotate(15,120,-2)"/>
    <ellipse cx="150" cy="-14" rx="10" ry="6" fill="#2a5020" transform="rotate(-10,150,-14)"/>
    <ellipse cx="180" cy="-6"  rx="10" ry="6" fill="#2a5020" transform="rotate(5,180,-6)"/>
    <ellipse cx="210" cy="-18" rx="10" ry="6" fill="#2a5020" transform="rotate(-15,210,-18)"/>
    <ellipse cx="240" cy="-4"  rx="10" ry="6" fill="#2a5020" transform="rotate(8,240,-4)"/>
  </g>

  <!-- Owl of Athena -->
  <g transform="translate(30,160)" class="art-el" style="animation-delay:1s" opacity=".5">
    <ellipse cx="40" cy="60" rx="28" ry="35" fill="#1a2d5a" stroke="#3a5090" stroke-width="1.5"/>
    <circle cx="30" cy="44" r="12" fill="#142248" stroke="#3a5090" stroke-width="1.5"/>
    <circle cx="50" cy="44" r="12" fill="#142248" stroke="#3a5090" stroke-width="1.5"/>
    <circle cx="30" cy="44" r="6" fill="#4a6abf"/>
    <circle cx="50" cy="44" r="6" fill="#4a6abf"/>
    <circle cx="31" cy="43" r="2" fill="#fff" opacity=".6"/>
    <circle cx="51" cy="43" r="2" fill="#fff" opacity=".6"/>
    <polygon points="40,54 36,60 44,60" fill="#c9a84c" opacity=".8"/>
    <path d="M20,42 Q12,35 14,28 Q20,34 20,42" fill="#1a2d5a" stroke="#3a5090" stroke-width="1"/>
    <path d="M60,42 Q68,35 66,28 Q60,34 60,42" fill="#1a2d5a" stroke="#3a5090" stroke-width="1"/>
  </g>
</svg>
</div>

<!-- Persia panel -->
<div id="panel-persia">
<svg width="100%" height="100%" viewBox="0 0 500 900" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="pGlow" cx="30%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#5a1808" stop-opacity=".5"/>
      <stop offset="100%" stop-color="#0a0702" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="500" height="900" fill="url(#pGlow)"/>

  <!-- Persepolis columns -->
  <g transform="translate(120,500)" class="art-el" style="animation-delay:.3s">
    <rect x="0" y="240" width="340" height="14" fill="#6a2808" opacity=".7"/>
    <rect x="10" y="230" width="320" height="12" fill="#8a3810" opacity=".6"/>
    <!-- Tall Persian columns (taller than Greek) -->
    <g fill="#6a2808" opacity=".7">
      <rect x="10"  y="10" width="22" height="220" rx="2"/>
      <rect x="62"  y="10" width="22" height="220" rx="2"/>
      <rect x="114" y="10" width="22" height="220" rx="2"/>
      <rect x="166" y="10" width="22" height="220" rx="2"/>
      <rect x="218" y="10" width="22" height="220" rx="2"/>
      <rect x="270" y="10" width="22" height="220" rx="2"/>
      <rect x="322" y="10" width="22" height="220" rx="2"/>
    </g>
    <g fill="#aa5828" opacity=".3">
      <rect x="13"  y="10" width="5" height="220"/>
      <rect x="65"  y="10" width="5" height="220"/>
      <rect x="117" y="10" width="5" height="220"/>
      <rect x="169" y="10" width="5" height="220"/>
      <rect x="221" y="10" width="5" height="220"/>
      <rect x="273" y="10" width="5" height="220"/>
      <rect x="325" y="10" width="5" height="220"/>
    </g>
    <!-- Bull capitals (Persian style) -->
    <g fill="#8a3810" opacity=".8">
      <!-- Simplified bull head capitals -->
      <ellipse cx="21"  cy="8" rx="16" ry="6"/>
      <ellipse cx="73"  cy="8" rx="16" ry="6"/>
      <ellipse cx="125" cy="8" rx="16" ry="6"/>
      <ellipse cx="177" cy="8" rx="16" ry="6"/>
      <ellipse cx="229" cy="8" rx="16" ry="6"/>
      <ellipse cx="281" cy="8" rx="16" ry="6"/>
      <ellipse cx="333" cy="8" rx="16" ry="6"/>
    </g>
    <!-- Cross beams -->
    <rect x="0" y="0"  width="356" height="6" fill="#aa4820" opacity=".6"/>
    <rect x="0" y="-8" width="356" height="6" fill="#8a3810" opacity=".5"/>
  </g>

  <!-- Persian warrior/immortal silhouette -->
  <g transform="translate(100,270)" class="art-el" style="animation-delay:.6s" opacity=".55">
    <!-- Spear -->
    <line x1="30" y1="10" x2="120" y2="350" stroke="#aa5828" stroke-width="3" stroke-linecap="round"/>
    <polygon points="30,10 22,38 38,38" fill="#cc8840"/>

<!-- Stars -->
<div id="stars"></div>

<!-- Faction labels -->
<div id="lbl-greece" class="faction-label">Hellenic League</div>
<div id="lbl-persia"  class="faction-label">Persian Empire</div>

<!-- Centre UI -->
<div id="centre">
  <div id="title-wrap">
    <div id="title">Press the Line</div>
    <div id="subtitle">Greece &nbsp;·&nbsp; 499 BCE &nbsp;·&nbsp; Persia</div>
  </div>

  <div class="ornament">⸻ ⚔ ⸻</div>

  <div id="btns">
    <div id="difficulty-wrap">
      <div id="difficulty-label">Difficulty</div>
      <div class="diff-seg">
        <button class="diff-btn" data-diff="easy" onclick="setDifficulty('easy')">Easy</button>
        <button class="diff-btn active" data-diff="normal" onclick="setDifficulty('normal')">Normal</button>
        <button class="diff-btn" data-diff="hard" onclick="setDifficulty('hard')">Hard</button>
      </div>
    </div>
    <button class="btn-faction" id="btn-continue" style="display:none;" onclick="openLoadPanel()">
      ⮞ &nbsp;Continue
    </button>
    <button class="btn-faction" id="btn-greece" onclick="choose('greece')">
      ⚔ &nbsp;Play as Greece
    </button>
    <button class="btn-faction" id="btn-persia" onclick="choose('persia')">
      🏹 &nbsp;Play as Persia
    </button>
    <div class="ornament" style="font-size:12px;margin:4px 0;">· · ·</div>
    <button class="btn-faction" id="btn-quit" onclick="quit()">
      Quit
    </button>
  </div>
</div>

<div id="load-panel">
  <div class="ld-card">
    <h2>Load Game</h2>
    <div class="ld-sub">Saved in this browser · or import a save file</div>
    <div id="ld-slots"></div>
    <button class="ld-close" onclick="closeLoadPanel()">Cancel</button>
  </div>
</div>
<input id="ld-import-file" type="file" accept="application/json,.json" style="display:none">

<div id="credit">A Battle of the Ancient World</div>

<script>
// Stars
(function(){
  var s=document.getElementById('stars');
  for(var i=0;i<120;i++){
    var el=document.createElement('div');
    el.className='star';
    var sz=Math.random()*2+.5;
    el.style.cssText='width:'+sz+'px;height:'+sz+'px;top:'+Math.random()*100+'%;left:'+Math.random()*100+'%;'
      +'--d:'+(2+Math.random()*4)+'s;--delay:'+(Math.random()*4)+'s;opacity:'+(Math.random()*.5+.1)+';';
    s.appendChild(el);
  }
})();

var selectedDifficulty = 'normal';
function setDifficulty(d) {
  selectedDifficulty = d;
  var btns = document.querySelectorAll('.diff-btn');
  for (var i = 0; i < btns.length; i++) {
    btns[i].classList.toggle('active', btns[i].getAttribute('data-diff') === d);
  }
}

function choose(side) {
  // New game → wipe ALL per-game session state for a clean slate. sessionStorage
  // holds only per-game data (armies, AI state, campaign/city state, economy,
  // year/time, battle handoff). Cross-game settings and saves live in
  // localStorage, so a full clear is safe and resets every key without having to
  // enumerate them (and stays correct as new keys are added). The keys the
  // intro/map need are set immediately afterward.
  sessionStorage.clear();
  // Store chosen side so the map/battle knows
  sessionStorage.setItem('playerSide', side);
  // Difficulty + one-shot seed flag (read by ancient-map's seedNewGameArmies).
  sessionStorage.setItem('difficulty', selectedDifficulty);
  sessionStorage.setItem('newGameSeed', '1');
  // New game → reset all tutorial progress so briefings and coach-marks re-appear.
  // Clears ptl.seenBattleBriefing, ptl.seenMapBriefing, ptl.seenTips, ptl.showCoachMarks,
  // and any future keys added under the ptl.* namespace.
  try {
    Object.keys(localStorage)
      .filter(function(k) { return k.indexOf('ptl.') === 0; })
      .forEach(function(k) { localStorage.removeItem(k); });
  } catch (e) { /* ignore sandboxed localStorage */ }
  // First stop: intro (historical prologue). Intro forwards to ancient-map.html.
  window.location.href = 'intro.html';
}

// ── Saved games (load side — mirror of ancient-map's save engine) ──
var _PTL_SAVE_SLOTS = ['auto','slot1','slot2'];
function _ptlSaveSlotKey(id){ return 'ptl.save.'+id; }
function ptlReadSave(id){ try{ var v=localStorage.getItem(_ptlSaveSlotKey(id)); return v?JSON.parse(v):null; }catch(e){ return null; } }
function ptlAnySave(){ for(var i=0;i<_PTL_SAVE_SLOTS.length;i++){ if(ptlReadSave(_PTL_SAVE_SLOTS[i])) return true; } return false; }
function ptlRestoreSnapshot(data){ try{ sessionStorage.clear(); Object.keys(data||{}).forEach(function(k){ sessionStorage.setItem(k,data[k]); }); }catch(e){} }
function ptlLoadSaveAndGo(id){ var m=ptlReadSave(id); if(!m||!m.data) return false; ptlRestoreSnapshot(m.data); window.location.href='ancient-map.html'; return true; }
function ptlImportSave(id,fileText){ try{ var m=JSON.parse(fileText); if(!m||!m.data||!m.data.playerSide) return false; if(!m.v)m.v=1; localStorage.setItem(_ptlSaveSlotKey(id), JSON.stringify(m)); return true; }catch(e){ return false; } }

var _ldImportTarget=null;
function _ldAgo(ts){ if(!ts)return''; var s=Math.floor((Date.now()-ts)/1000); if(s<60)return'just now'; if(s<3600)return Math.floor(s/60)+'m ago'; if(s<86400)return Math.floor(s/3600)+'h ago'; return Math.floor(s/86400)+'d ago'; }
function _ldMeta(m){ if(!m)return'Empty'; return (m.faction==='persia'?'Persia':'Greece')+' · '+(m.year||'?')+' BCE · '+_ldAgo(m.ts); }
function renderLoadPanel(){
  var host=document.getElementById('ld-slots'); if(!host)return; host.innerHTML='';
  [{id:'auto',label:'Autosave',auto:true},{id:'slot1',label:'Save 1'},{id:'slot2',label:'Save 2'}].forEach(function(sl){
    var m=ptlReadSave(sl.id);
    var div=document.createElement('div'); div.className='ld-slot';
    var t=document.createElement('div'); t.className='ld-title'; t.textContent=sl.auto?'Autosave':(sl.label+(m&&m.name&&m.name!==sl.label?' — '+m.name:''));
    var meta=document.createElement('div'); meta.className='ld-meta'; meta.textContent=_ldMeta(m);
    var row=document.createElement('div'); row.className='ld-row';
    function add(label,cls,fn){ var b=document.createElement('button'); b.className='ld-btn'+(cls?' '+cls:''); b.textContent=label; b.onclick=fn; row.appendChild(b); }
    if(m) add('Load','primary',function(){ if(confirm('Load this game ('+((m&&m.year)||'?')+' BCE)?')) ptlLoadSaveAndGo(sl.id); });
    add('Import',null,function(){ _ldImportTarget=sl.id; var f=document.getElementById('ld-import-file'); if(f){ f.value=''; f.click(); } });
    div.appendChild(t); div.appendChild(meta); div.appendChild(row); host.appendChild(div);
  });
}
function openLoadPanel(){ renderLoadPanel(); var p=document.getElementById('load-panel'); if(p)p.style.display='flex'; }
function closeLoadPanel(){ var p=document.getElementById('load-panel'); if(p)p.style.display='none'; }
(function(){
  var fi=document.getElementById('ld-import-file');
  if(fi) fi.addEventListener('change', function(){ var f=this.files&&this.files[0]; if(!f||!_ldImportTarget)return; var rd=new FileReader(); rd.onload=function(){ if(ptlImportSave(_ldImportTarget,rd.result)) renderLoadPanel(); else alert('That file is not a valid Press the Line save.'); }; rd.readAsText(f); });
  var cb=document.getElementById('btn-continue'); if(cb && ptlAnySave()) cb.style.display='';
})();

function quit() {
  // In a browser context, just show a farewell — can't truly close the tab from JS
  document.getElementById('centre').innerHTML =
    '<div style="text-align:center;animation:fadeDown .6s ease both">'
    +'<div style="font-family:Cinzel Decorative,serif;font-size:clamp(18px,5vw,40px);color:#c9a84c;letter-spacing:6px;text-shadow:0 0 30px rgba(201,168,76,.5)">Farewell</div>'
    +'<div style="color:#4a3a18;font-size:clamp(10px,2vw,14px);letter-spacing:4px;margin-top:16px;">The battle awaits your return.</div>'
    +'<button onclick="window.location.reload()" style="margin-top:32px;background:transparent;border:1px solid rgba(100,80,30,.4);color:#6a5828;font-family:Cinzel,serif;font-size:12px;letter-spacing:3px;padding:10px 24px;cursor:pointer;border-radius:3px;">Return</button>'
    +'</div>';
}
</script>
